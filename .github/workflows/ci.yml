name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Backend Tests
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run linting
        run: |
          pip install ruff
          ruff check backend/ --output-format=github

      - name: Run security tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
        env:
          TESTING: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  # ============================================
  # Frontend Tests
  # ============================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run linting
        run: |
          cd frontend
          npm run lint || true

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run tests
        run: |
          cd frontend
          npm test || true

  # ============================================
  # Security Scanning
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'

      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r backend/app -ll --skip B101

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=high || true

  # ============================================
  # Build Docker Image
  # ============================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # NPM Publish
  # ============================================
  npm-publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.event_name == 'release'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================
  # Installation Testing
  # ============================================
  install-test:
    name: Test Installation Scripts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [npm, docker, shell]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test NPM Global Install
        if: matrix.test-type == 'npm'
        run: |
          # Setup Python first (required by postinstall)
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-venv
          python3.11 -m ensurepip --upgrade || true
          # Pack and install locally (skip postinstall for test)
          npm pack
          npm install -g ./closedpaw-*.tgz --ignore-scripts
          # Verify installation
          which closedpaw
          closedpaw --version
          closedpaw --help

      - name: Test Docker Installation
        if: matrix.test-type == 'docker'
        run: |
          # Build Docker image
          docker build -t closedpaw:test .
          # Verify image exists
          docker images | grep closedpaw
          # Test container startup (without Ollama)
          docker run --rm closedpaw:test python --version
          docker run --rm closedpaw:test node --version

      - name: Test Shell Installer
        if: matrix.test-type == 'shell'
        run: |
          # Make installer executable
          chmod +x installer/install.sh
          # Test in dry-run mode
          cd /tmp
          bash $GITHUB_WORKSPACE/installer/install.sh --dry-run --yes || true
          # Verify script syntax
          bash -n $GITHUB_WORKSPACE/installer/install.sh

  # ============================================
  # Multi-OS Installation Test
  # ============================================
  install-test-multi-os:
    name: Test Install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-20.04]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git

      - name: Test Prerequisites Installation
        run: |
          # Test Python 3.11 installation
          if ! command -v python3.11 &> /dev/null; then
            sudo apt-get install -y software-properties-common
            sudo add-apt-repository -y ppa:deadsnakes/ppa
            sudo apt-get update
            sudo apt-get install -y python3.11 python3.11-venv python3.11-dev
          fi
          python3.11 --version
          # Install pip using ensurepip
          python3.11 -m ensurepip --upgrade || true

      - name: Test Node.js 20 Installation
        run: |
          if ! command -v node &> /dev/null || [[ $(node --version) != v20* ]]; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          node --version
          npm --version

      - name: Test Backend Dependencies
        run: |
          cd backend
          python3.11 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          # Verify key packages
          pip show fastapi pydantic cryptography

      - name: Test Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build

  # ============================================
  # Integration Tests
  # ============================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull test model
        run: |
          curl -X POST http://localhost:11434/api/pull -d '{"name": "llama3.2:1b"}'

      - name: Run integration tests
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --ignore=tests/test_integration.py
        env:
          OLLAMA_HOST: http://localhost:11434
          TESTING: true
